<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Jardín Zen</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
        }
        #loading-screen {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #1a1a1a; 
            color: #d8cdbc; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
            transition: opacity 1.2s ease;
        }
        .spinner { 
            border: 3px solid #5a4a3a; 
            border-top: 3px solid #b8a88a; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 2s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #d8cdbc;
            background: rgba(20,20,20,0.7);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            font-size: 14px;
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
            letter-spacing: 1px;
        }
        #instrucciones {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #d8cdbc;
            background: rgba(20,20,20,0.6);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
            white-space: nowrap;
        }
        #haiku {
            position: absolute;
            bottom: 100px;
            right: 30px;
            color: #b8a88a;
            font-size: 14px;
            font-style: italic;
            text-align: right;
            background: rgba(20,20,20,0.5);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            border-left: 3px solid #8a7a6a;
            z-index: 100;
            line-height: 1.8;
        }
        #haiku small {
            font-size: 11px;
            color: #9a8a7a;
            display: block;
            margin-top: 8px;
        }
        #error-message {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #d88;
            background: rgba(30,30,30,0.9);
            padding: 10px;
            border-radius: 5px;
            display: none;
            z-index: 2000;
            font-size: 12px;
        }
        #entregable {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #b8a88a;
            background: rgba(20,20,20,0.6);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
        }
        
        /* --- ESTILOS ZEN --- */
        #rake-controls {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(200,180,160,0.2);
            color: #d8cdbc;
            z-index: 100;
            font-size: 13px;
            width: 160px;
        }
        #rake-controls h3 {
            margin: 0 0 10px 0;
            text-align: center;
            font-weight: normal;
            border-bottom: 1px solid #5a4a3a;
            padding-bottom: 5px;
        }
        #rake-controls input[type="range"] {
            width: 100%;
            margin-bottom: 15px;
            background: #5a4a3a;
            accent-color: #b8a88a;
        }
        #rake-controls button {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #b8a88a;
            color: #b8a88a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
        #rake-controls button:hover {
            background: rgba(184,168,138,0.2);
        }
        #rake-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4a8f4a;
            margin-left: 5px;
            box-shadow: 0 0 5px #4a8f4a;
        }
        
        #music-button {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(8px);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(200,180,160,0.2);
            color: #d8cdbc;
            font-size: 12px;
            cursor: pointer;
            z-index: 101;
        }
        #music-button:hover {
            background: rgba(40,40,40,0.9);
        }
        #music-button.playing {
            background: rgba(70,90,70,0.8);
        }
        
        #zen-quote {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: #8a7a6a;
            font-size: 11px;
            letter-spacing: 5px;
            background: rgba(20,20,20,0.4);
            padding: 15px 5px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
       
    </div>
    
    <div id="info">  Jardín Zen </div>
    
    
    <div id="instrucciones">🖱️ Izquierdo: mover  •  🖱️ Derecho + arrastrar: rastrillar  •  🖱️ Rueda: zoom</div>

    <div id="haiku">
        
        <small>— hasta la flor del musgo en la piedra es zen</small>
    </div>

    <audio id="musica-jardin" loop preload="auto">
        <source src="model-zen/music zen garden.mp3" type="audio/mpeg">
    </audio>

    <button id="music-button">🔈 Música Zen</button>

    <div id="rake-controls">
        <h3> Rastrillo <span id="rake-status"></span></h3>
        <label for="rake-size">Tamaño: <span id="size-value">3</span></label>
        <input type="range" id="rake-size" min="1" max="8" value="3" step="0.5">
        <button id="clear-sand"> Limpiar</button>
    </div>

    <div id="error-message"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- CONFIGURACIÓN ZEN (Fondo oscuro tradicional) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a); // Fondo oscuro zen
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.015); // Niebla meditativa

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 3.5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.bias = 0.0002;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 0.9;
        document.body.appendChild(renderer.domElement);

        // --- CONTROLES MEDITATIVOS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.03;
        controls.maxPolarAngle = Math.PI / 2.5;
        controls.minDistance = 3;
        controls.maxDistance = 15;
        controls.target.set(0, 0.2, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.08; // Más lento para meditación
        controls.enableZoom = true;
        controls.zoomSpeed = 0.5;
        controls.enablePan = false;

        // --- ILUMINACIÓN LUNA (zen auténtico) ---
        const ambientLight = new THREE.AmbientLight(0x5a5a5a, 0.5);
        scene.add(ambientLight);

        const moonLight = new THREE.DirectionalLight(0xc0b8a8, 0.8);
        moonLight.position.set(-5, 8, 10);
        moonLight.castShadow = true;
        moonLight.receiveShadow = true;
        scene.add(moonLight);

        const fillLight = new THREE.DirectionalLight(0xa89888, 0.3);
        fillLight.position.set(5, 4, -8);
        scene.add(fillLight);

        // ============================================================
        // MÚSICA
        // ============================================================
        
        const audio = document.getElementById('musica-jardin');
        const musicButton = document.getElementById('music-button');
        let musicStarted = false;
        
        audio.volume = 0.4;
        
        function startMusic() {
            if (!musicStarted) {
                audio.play().then(() => {
                    musicStarted = true;
                    musicButton.textContent = '🔊 Música Zen';
                    musicButton.classList.add('playing');
                }).catch(() => {});
            }
        }
        
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicButton.textContent = '🔊 Música Zen';
                musicButton.classList.add('playing');
            } else {
                audio.pause();
                musicButton.textContent = '🔈 Música Zen';
                musicButton.classList.remove('playing');
            }
        }
        
        musicButton.addEventListener('click', toggleMusic);
        
        const startMusicOnInteraction = () => {
            startMusic();
            renderer.domElement.removeEventListener('click', startMusicOnInteraction);
            renderer.domElement.removeEventListener('mousedown', startMusicOnInteraction);
        };
        
        renderer.domElement.addEventListener('click', startMusicOnInteraction);
        renderer.domElement.addEventListener('mousedown', startMusicOnInteraction);

        // ============================================================
        // ARENA ZEN (textura mejorada)
        // ============================================================
        
        const sandCanvas = document.createElement('canvas');
        sandCanvas.width = 1024;
        sandCanvas.height = 1024;
        const sandCtx = sandCanvas.getContext('2d');
        
        function initSandTexture() {
            // Base de arena (color más natural)
            sandCtx.fillStyle = '#e8ddcc';
            sandCtx.fillRect(0, 0, sandCanvas.width, sandCanvas.height);
            
            // Grano fino (más sutil)
            for (let i = 0; i < 15000; i++) {
                const x = Math.random() * sandCanvas.width;
                const y = Math.random() * sandCanvas.height;
                const alpha = Math.random() * 0.08;
                sandCtx.fillStyle = `rgba(140, 120, 100, ${alpha})`;
                sandCtx.fillRect(x, y, 1, 1);
            }
            
            // Ondas concéntricas orgánicas (más sutiles)
            sandCtx.strokeStyle = 'rgba(140, 120, 100, 0.2)';
            sandCtx.lineWidth = 3;
            
            const centerX = sandCanvas.width / 2;
            const centerY = sandCanvas.height / 2;
            
            for (let r = 200; r < 900; r += 100) {
                sandCtx.beginPath();
                sandCtx.arc(centerX, centerY, r, 0, Math.PI * 2);
                sandCtx.stroke();
            }
        }
        
        initSandTexture();
        const sandTexture = new THREE.CanvasTexture(sandCanvas);
        
        const groundGeo = new THREE.CircleGeometry(9, 128);
        const groundMat = new THREE.MeshStandardMaterial({ 
            map: sandTexture,
            color: 0xe8ddcc,
            roughness: 0.95,
            metalness: 0
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Variables para rastrillar
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let lastPos = { x: 0, y: 0 };
        const groundObject = ground;
        
        const rakeSizeInput = document.getElementById('rake-size');
        const sizeValueSpan = document.getElementById('size-value');
        const clearButton = document.getElementById('clear-sand');
        const statusIndicator = document.getElementById('rake-status');
        
        let brushSize = 3;
        
        rakeSizeInput.addEventListener('input', (e) => {
            brushSize = parseFloat(e.target.value);
            sizeValueSpan.textContent = brushSize;
        });
        
        clearButton.addEventListener('click', () => {
            initSandTexture();
            sandTexture.needsUpdate = true;
        });
        
        function drawOnSand(x, z) {
            const canvasX = ((x / 9) + 1) * 512;
            const canvasY = ((z / 9) + 1) * 512;
            
            if (canvasX >= 0 && canvasX <= sandCanvas.width && canvasY >= 0 && canvasY <= sandCanvas.height) {
                
                // Surco del rastrillo (más sutil)
                sandCtx.beginPath();
                sandCtx.arc(canvasX, canvasY, brushSize, 0, Math.PI * 2);
                sandCtx.fillStyle = 'rgba(100, 80, 60, 0.3)';
                sandCtx.fill();
                
                if (lastPos.x !== 0 && lastPos.y !== 0) {
                    sandCtx.beginPath();
                    sandCtx.moveTo(lastPos.x, lastPos.y);
                    sandCtx.lineTo(canvasX, canvasY);
                    sandCtx.strokeStyle = 'rgba(80, 60, 40, 0.4)';
                    sandCtx.lineWidth = brushSize;
                    sandCtx.stroke();
                }
                
                lastPos.x = canvasX;
                lastPos.y = canvasY;
                sandTexture.needsUpdate = true;
            }
        }

        // ============================================================
        // ELEMENTOS ZEN (mínimos pero esenciales)
        // ============================================================
        
        // Grava fina (solo alrededor de piedras grandes)
        const gravelGeo = new THREE.BufferGeometry();
        const gravelCount = 100;
        const gravelPositions = new Float32Array(gravelCount * 3);
        
        for (let i = 0; i < gravelCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 8 + 0.5;
            gravelPositions[i * 3] = Math.cos(angle) * radius;
            gravelPositions[i * 3 + 1] = 0.02;
            gravelPositions[i * 3 + 2] = Math.sin(angle) * radius;
        }
        
        gravelGeo.setAttribute('position', new THREE.BufferAttribute(gravelPositions, 3));
        const gravelMat = new THREE.PointsMaterial({ color: 0xb0a090, size: 0.03, transparent: true, opacity: 0.4 });
        const gravel = new THREE.Points(gravelGeo, gravelMat);
        scene.add(gravel);

        // Pasto solo en bordes exteriores (mínimo)
        function createGrassBlade(x, z) {
            const height = 0.1 + Math.random() * 0.15;
            const geometry = new THREE.ConeGeometry(0.015, height, 3);
            const material = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color().setHSL(0.3, 0.4, 0.15),
                roughness: 0.9
            });
            const blade = new THREE.Mesh(geometry, material);
            blade.position.set(x, height/2, z);
            blade.castShadow = true;
            blade.receiveShadow = true;
            return blade;
        }

        for (let i = 0; i < 80; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 9.3 + Math.random() * 1.2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            scene.add(createGrassBlade(x, z));
        }

        // Bambú (solo 4 grupos, mínimos)
        function createBamboo(pos, height = 1.5) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x6a7a4a, roughness: 0.8 });
            
            for (let i = 0; i < 3; i++) {
                const geo = new THREE.CylinderGeometry(0.08, 0.1, height, 5);
                const segment = new THREE.Mesh(geo, mat);
                segment.position.y = height/2;
                segment.castShadow = true;
                group.add(segment);
            }
            
            group.position.set(pos.x, 0, pos.z);
            return group;
        }

        const bambooPositions = [[-6, -5], [6, -5], [-6, 5], [6, 5]];
        bambooPositions.forEach(pos => {
            scene.add(createBamboo({x: pos[0], z: pos[1]}, 1.5));
        });

        // Linternas de piedra (solo 2, para no saturar)
        function createStoneLantern(pos) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.95 });
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.15, 6), mat);
            base.position.y = 0.08;
            base.castShadow = true;
            group.add(base);
            
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.6, 6), mat);
            pillar.position.y = 0.5;
            pillar.castShadow = true;
            group.add(pillar);
            
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.3), mat);
            box.position.y = 1.0;
            box.castShadow = true;
            group.add(box);
            
            const roof = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.15, 4), mat);
            roof.position.y = 1.2;
            roof.rotation.y = Math.PI/4;
            roof.castShadow = true;
            group.add(roof);
            
            group.position.set(pos.x, 0, pos.z);
            return group;
        }

        scene.add(createStoneLantern({x: -3, z: 3}));
        scene.add(createStoneLantern({x: 3.5, z: -3}));

        // Camino de piedras (mínimo)
        const pathStones = [[-1, 0.02, 1.2], [1, 0.02, -1], [2, 0.02, 0.8], [-1.5, 0.02, -0.8]];
        pathStones.forEach(pos => {
            const stoneGeo = new THREE.CylinderGeometry(0.25, 0.27, 0.04, 5);
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.9 });
            const stone = new THREE.Mesh(stoneGeo, stoneMat);
            stone.position.set(pos[0], 0.02, pos[2]);
            stone.receiveShadow = true;
            stone.castShadow = true;
            scene.add(stone);
        });

        // Musgo SOLO alrededor de piedras (no en toda la arena)
        const mossGeo = new THREE.BufferGeometry();
        const mossCount = 60;
        const mossPositions = new Float32Array(mossCount * 3);
        
        for (let i = 0; i < mossCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2 + Math.random() * 3;
            mossPositions[i * 3] = Math.cos(angle) * radius;
            mossPositions[i * 3 + 1] = 0.01;
            mossPositions[i * 3 + 2] = Math.sin(angle) * radius;
        }
        
        mossGeo.setAttribute('position', new THREE.BufferAttribute(mossPositions, 3));
        const mossMat = new THREE.PointsMaterial({ color: 0x5a6a4a, size: 0.06, transparent: true, opacity: 0.3 });
        const moss = new THREE.Points(mossGeo, mossMat);
        scene.add(moss);

        // Montañas al fondo (más sutiles)
        const mountainMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 1 });
        const mountain1 = new THREE.Mesh(new THREE.ConeGeometry(2, 2.5, 5), mountainMat);
        mountain1.position.set(-7, -1, -14);
        scene.add(mountain1);
        
        const mountain2 = new THREE.Mesh(new THREE.ConeGeometry(1.8, 2.2, 5), mountainMat);
        mountain2.position.set(6, -1, -15);
        scene.add(mountain2);

        // Borde de cuerda (sutil)
        const ropeRadius = 8.5;
        const ropePoints = [];
        for (let i = 0; i <= 50; i++) {
            const angle = (i / 50) * Math.PI * 2;
            ropePoints.push(new THREE.Vector3(Math.cos(angle) * ropeRadius, 0.06, Math.sin(angle) * ropeRadius));
        }
        const ropeLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(ropePoints),
            new THREE.LineBasicMaterial({ color: 0x7a6a5a })
        );
        scene.add(ropeLine);

        // ============================================================
        // CARGA DE MODELOS (tus modelos)
        // ============================================================
        
        let modelosCargados = 0;
        const totalModelos = 24;
        let errores = [];

        function verificarCargaCompleta() {
            modelosCargados++;
            if (modelosCargados >= totalModelos) {
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-screen').remove(), 1000);
                }, 800);
            }
        }

        const loader = new GLTFLoader();

        const loadModel = (filename, pos, scale = 1, rot = 0) => {
            loader.load(`model-zen/${filename}`, (gltf) => {
                const model = gltf.scene;
                model.position.set(pos.x, pos.y, pos.z);
                model.scale.set(scale, scale, scale);
                model.rotation.y = rot;
                
                model.traverse(n => {
                    if (n.isMesh) {
                        n.castShadow = true;
                        n.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                console.log(`✅ ${filename}`);
                verificarCargaCompleta();
            }, undefined, (error) => {
                console.error(`❌ ${filename}:`, error);
                errores.push(filename);
                verificarCargaCompleta();
            });
        };

        // Tus modelos (exactamente como los tienes)
        loadModel('Flower Pot.glb', {x: 0, y: 0, z: 0}, 0.5);
        loadModel('Wood Log.glb', {x: 0, y: 0.2, z: 0}, 0.45);
        
        const rockPositions = [
            [2.2, 1.2, 0.5], [2.8, 1.8, 0.35], [1.6, 2.0, 0.3],
            [-2.0, -1.5, 0.55], [-2.7, -2.2, 0.4], [-1.3, -2.3, 0.25],
            [0.8, -2.5, 0.35], [3.2, -1.0, 0.3], [-2.5, 2.2, 0.25], [1.5, -1.0, 0.2]
        ];
        
        rockPositions.forEach((pos, i) => {
            loadModel('Rock.glb', {x: pos[0], y: 0, z: pos[1]}, pos[2], i * 0.5);
        });

        const bambooList = [
            [-4.5, -4.0, 0.6], [-4.0, -4.5, 0.7], [-3.5, -4.8, 0.5],
            [4.5, -4.0, 0.65], [4.0, -4.5, 0.75], [3.5, -4.8, 0.55],
            [-4.5, 4.0, 0.6], [-4.0, 4.5, 0.7], [4.5, 4.0, 0.65], [4.0, 4.5, 0.55]
        ];
        
        bambooList.forEach((pos, i) => {
            loadModel('Bamboo.glb', {x: pos[0], y: 0, z: pos[1]}, pos[2], i * 0.3);
        });

        loadModel('Tree.glb', {x: -3.2, y: 0, z: 2.8}, 0.35);
        loadModel('Tree.glb', {x: 3.5, y: 0, z: 2.5}, 0.3);

        const bushList = [
            [-2.8, -3.2, 0.25], [3.0, -2.8, 0.3], [-1.5, 3.5, 0.2],
            [2.0, 3.2, 0.25], [-3.5, 1.2, 0.2], [3.8, -1.5, 0.25]
        ];
        
        bushList.forEach(pos => {
            loadModel('Bush.glb', {x: pos[0], y: 0, z: pos[1]}, pos[2]);
        });

        // ============================================================
        // EVENTOS RASTRILLO
        // ============================================================
        
        renderer.domElement.addEventListener('mousedown', (event) => {
            if (event.button !== 2) return;
            event.preventDefault();
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(groundObject);
            
            if (intersects.length > 0) {
                isDragging = true;
                controls.autoRotate = false;
                statusIndicator.style.background = '#ffaa44';
                
                const point = intersects[0].point;
                lastPos.x = 0;
                lastPos.y = 0;
                drawOnSand(point.x, point.z);
            }
        });
        
        window.addEventListener('mousemove', (event) => {
            if (!isDragging) return;
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(groundObject);
            
            if (intersects.length > 0) {
                drawOnSand(intersects[0].point.x, intersects[0].point.z);
            }
        });
        
        window.addEventListener('mouseup', (event) => {
            if (event.button !== 2) return;
            if (isDragging) {
                isDragging = false;
                controls.autoRotate = true;
                statusIndicator.style.background = '#4a8f4a';
                lastPos.x = 0;
                lastPos.y = 0;
            }
        });
        
        window.addEventListener('mouseleave', () => {
            if (isDragging) {
                isDragging = false;
                controls.autoRotate = true;
                statusIndicator.style.background = '#4a8f4a';
                lastPos.x = 0;
                lastPos.y = 0;
            }
        });
        
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
