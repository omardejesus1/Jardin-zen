<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Zen - Cascada Real</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: '游明朝', 'Yu Mincho', 'Segoe UI', serif;
        }
        #loading-screen {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #1a1a1a; 
            color: #d8cdbc; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
            transition: opacity 1.2s ease;
        }
        .spinner { 
            border: 3px solid #5a4a3a; 
            border-top: 3px solid #b8a88a; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 2s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #d8cdbc;
            background: rgba(20,20,20,0.7);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            font-size: 14px;
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
            letter-spacing: 1px;
        }
        #instrucciones {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #d8cdbc;
            background: rgba(20,20,20,0.6);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
            white-space: nowrap;
        }
        #haiku {
            position: absolute;
            bottom: 100px;
            right: 30px;
            color: #b8a88a;
            font-size: 14px;
            font-style: italic;
            text-align: right;
            background: rgba(20,20,20,0.5);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            border-left: 3px solid #8a7a6a;
            z-index: 100;
            line-height: 1.8;
        }
        #haiku small {
            font-size: 11px;
            color: #9a8a7a;
            display: block;
            margin-top: 8px;
        }
        #error-message {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #d88;
            background: rgba(30,30,30,0.9);
            padding: 10px;
            border-radius: 5px;
            display: none;
            z-index: 2000;
            font-size: 12px;
        }
        #entregable {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #b8a88a;
            background: rgba(20,20,20,0.6);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
        }
        
        /* --- ESTILOS ZEN --- */
        #rake-controls {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(200,180,160,0.2);
            color: #d8cdbc;
            z-index: 100;
            font-size: 13px;
            width: 160px;
        }
        #rake-controls h3 {
            margin: 0 0 10px 0;
            text-align: center;
            font-weight: normal;
            border-bottom: 1px solid #5a4a3a;
            padding-bottom: 5px;
        }
        #rake-controls input[type="range"] {
            width: 100%;
            margin-bottom: 15px;
            background: #5a4a3a;
            accent-color: #b8a88a;
        }
        #rake-controls button {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #b8a88a;
            color: #b8a88a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
        #rake-controls button:hover {
            background: rgba(184,168,138,0.2);
        }
        #rake-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4a8f4a;
            margin-left: 5px;
            box-shadow: 0 0 5px #4a8f4a;
        }
        
        #music-button {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(8px);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(200,180,160,0.2);
            color: #d8cdbc;
            font-size: 12px;
            cursor: pointer;
            z-index: 101;
        }
        #music-button:hover {
            background: rgba(40,40,40,0.9);
        }
        #music-button.playing {
            background: rgba(70,90,70,0.8);
        }
        
        #zen-quote {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: #8a7a6a;
            font-size: 11px;
            letter-spacing: 5px;
            background: rgba(20,20,20,0.4);
            padding: 15px 5px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(200,180,160,0.2);
            z-index: 100;
        }
        
        #waterfall-control {
            position: absolute;
            bottom: 130px;
            left: 20px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(8px);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(200,180,160,0.2);
            color: #6a9aaa;
            font-size: 12px;
            cursor: pointer;
            z-index: 101;
        }
        
        #effects-control {
            position: absolute;
            bottom: 190px;
            left: 20px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(8px);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(200,180,160,0.2);
            color: #b8a88a;
            font-size: 12px;
            cursor: pointer;
            z-index: 101;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">🌸 Cargando jardín zen...</p>
    </div>
    
    <div id="info"> 🌸 滝と桜 • Cascada y Cerezos</div>
    
    <div id="zen-quote">水 • 桜 • 禅</div>
    
    <div id="instrucciones">🖱️ Izquierdo: mover  •  🖱️ Derecho + arrastrar: rastrillar  •  🖱️ Rueda: zoom</div>

    <div id="haiku">
        桜舞う<br>
        水の流れは<br>
        心を洗う
        <small>— las flores de cerezo bailan, el agua que fluye purifica el alma</small>
    </div>

    <audio id="musica-jardin" loop preload="auto">
        <source src="model-zen/music zen garden.mp3" type="audio/mpeg">
    </audio>

    <button id="music-button">🔈 Música Zen</button>
    <button id="waterfall-control">💧 Cascada Activa</button>
    <button id="effects-control">✨ Efectos Especiales</button>

    <div id="rake-controls">
        <h3>Rastrillo <span id="rake-status"></span></h3>
        <label for="rake-size">Tamaño: <span id="size-value">3</span></label>
        <input type="range" id="rake-size" min="1" max="8" value="3" step="0.5">
        <button id="clear-sand">Limpiar</button>
    </div>

    <div id="error-message"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- CONFIGURACIÓN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.012);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 3.8, 7.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- CONTROLES ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.4;
        controls.minDistance = 3.5;
        controls.maxDistance = 15;
        controls.target.set(0, 0.3, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.07;
        controls.enableZoom = true;
        controls.zoomSpeed = 0.6;
        controls.enablePan = false;

        // --- ILUMINACIÓN ---
        const ambientLight = new THREE.AmbientLight(0x5a5a6a, 0.55);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xe8e0c8, 0.85);
        mainLight.position.set(-4, 10, 6);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        
        const backFill = new THREE.DirectionalLight(0xa8a8b8, 0.35);
        backFill.position.set(5, 4, -7);
        scene.add(backFill);
        
        const warmFill = new THREE.PointLight(0x8a7a6a, 0.3);
        warmFill.position.set(0, 1.5, 0);
        scene.add(warmFill);
        
        const waterfallLight = new THREE.PointLight(0x88aaff, 0.7, 8);
        waterfallLight.position.set(-3.2, 1.8, -2.2);
        scene.add(waterfallLight);

        // ============================================================
        // MÚSICA
        // ============================================================
        
        const audio = document.getElementById('musica-jardin');
        const musicButton = document.getElementById('music-button');
        let musicStarted = false;
        audio.volume = 0.35;
        
        function startMusic() {
            if (!musicStarted) {
                audio.play().then(() => {
                    musicStarted = true;
                    musicButton.textContent = '🔊 Música Zen';
                    musicButton.classList.add('playing');
                }).catch(() => {});
            }
        }
        
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicButton.textContent = '🔊 Música Zen';
                musicButton.classList.add('playing');
            } else {
                audio.pause();
                musicButton.textContent = '🔈 Música Zen';
                musicButton.classList.remove('playing');
            }
        }
        
        musicButton.addEventListener('click', toggleMusic);
        
        const startMusicOnInteraction = () => {
            startMusic();
            renderer.domElement.removeEventListener('click', startMusicOnInteraction);
            renderer.domElement.removeEventListener('mousedown', startMusicOnInteraction);
        };
        
        renderer.domElement.addEventListener('click', startMusicOnInteraction);
        renderer.domElement.addEventListener('mousedown', startMusicOnInteraction);

        // ============================================================
        // CASCADA REALISTA MEJORADA
        // ============================================================
        
        // Rocas base
        const rockMaterial = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.85, metalness: 0.05 });
        
        // Plataforma superior
        const topRock = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.9, 0.8, 7), rockMaterial);
        topRock.position.set(-3.2, 1.6, -2.2);
        topRock.castShadow = true;
        topRock.receiveShadow = true;
        scene.add(topRock);
        
        // Pared rocosa
        const rockWall = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 1.2), rockMaterial);
        rockWall.position.set(-3.2, 1.2, -2.8);
        rockWall.castShadow = true;
        rockWall.receiveShadow = true;
        scene.add(rockWall);
        
        // Agua del estanque superior (reflectante)
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x4a9ac0,
            emissive: 0x1a5a7a,
            emissiveIntensity: 0.2,
            roughness: 0.25,
            metalness: 0.85,
            transparent: true,
            opacity: 0.9
        });
        const upperWater = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.08, 32), waterMat);
        upperWater.position.set(-3.2, 1.98, -2.2);
        upperWater.castShadow = true;
        scene.add(upperWater);
        
        // CASCADA PRINCIPAL - AGUA CAYENDO (planos translúcidos)
        const fallMat = new THREE.MeshStandardMaterial({
            color: 0x5ab0d0,
            emissive: 0x1a5a7a,
            emissiveIntensity: 0.25,
            roughness: 0.2,
            metalness: 0.7,
            transparent: true,
            opacity: 0.85
        });
        
        // Plano principal de la cascada
        const mainFall = new THREE.Mesh(new THREE.PlaneGeometry(1.1, 2.2), fallMat);
        mainFall.position.set(-3.2, 1.2, -2.35);
        mainFall.castShadow = true;
        scene.add(mainFall);
        
        // Plano secundario (más atrás para dar profundidad)
        const backFall = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 2.0), fallMat);
        backFall.position.set(-3.15, 1.2, -2.55);
        backFall.castShadow = true;
        scene.add(backFall);
        
        // Plano lateral izquierdo
        const leftFall = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 1.9), fallMat);
        leftFall.position.set(-3.55, 1.2, -2.45);
        leftFall.rotation.y = 0.3;
        leftFall.castShadow = true;
        scene.add(leftFall);
        
        // Plano lateral derecho
        const rightFall = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 1.9), fallMat);
        rightFall.position.set(-2.85, 1.2, -2.45);
        rightFall.rotation.y = -0.3;
        rightFall.castShadow = true;
        scene.add(rightFall);
        
        // ============================================================
        // ARROYO QUE FLUYE DESDE LA CASCADA
        // ============================================================
        
        const streamPoints = [
            new THREE.Vector3(-3.2, 0.12, -2.2),
            new THREE.Vector3(-2.5, 0.1, -1.5),
            new THREE.Vector3(-1.8, 0.08, -0.9),
            new THREE.Vector3(-1.1, 0.07, -0.3),
            new THREE.Vector3(-0.4, 0.06, 0.3),
            new THREE.Vector3(0.3, 0.05, 0.8),
            new THREE.Vector3(1.0, 0.05, 1.2),
            new THREE.Vector3(1.7, 0.05, 1.5),
            new THREE.Vector3(2.4, 0.05, 1.7)
        ];
        
        const streamCurve = new THREE.CatmullRomCurve3(streamPoints);
        
        const streamMat = new THREE.MeshStandardMaterial({
            color: 0x4a9ac0,
            emissive: 0x1a5a7a,
            emissiveIntensity: 0.15,
            roughness: 0.3,
            metalness: 0.75,
            transparent: true,
            opacity: 0.85
        });
        
        for (let i = 0; i <= 50; i++) {
            const t = i / 50;
            const point = streamCurve.getPoint(t);
            const tangent = streamCurve.getTangent(t);
            const angle = Math.atan2(tangent.x, tangent.z);
            
            const segment = new THREE.Mesh(new THREE.PlaneGeometry(0.55, 0.4), streamMat);
            segment.position.set(point.x, point.y + 0.02, point.z);
            segment.rotation.y = angle;
            segment.rotation.x = -Math.PI / 2;
            segment.receiveShadow = true;
            scene.add(segment);
        }
        
        // Estanque final
        const pond = new THREE.Mesh(new THREE.CircleGeometry(0.8, 24), streamMat);
        pond.rotation.x = -Math.PI / 2;
        pond.position.set(2.4, 0.03, 1.7);
        pond.receiveShadow = true;
        scene.add(pond);
        
        // ============================================================
        // PARTÍCULAS DE AGUA (efecto de caída)
        // ============================================================
        
        const particleCount = 1200;
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = [];
        
        for (let i = 0; i < particleCount; i++) {
            const x = -3.2 + (Math.random() - 0.5) * 1.2;
            const z = -2.2 + (Math.random() - 0.5) * 0.9;
            const y = 1.5 + Math.random() * 0.9;
            
            particlePositions[i * 3] = x;
            particlePositions[i * 3 + 1] = y;
            particlePositions[i * 3 + 2] = z;
            
            particleVelocities.push({
                y: -0.018 - Math.random() * 0.015,
                x: (Math.random() - 0.5) * 0.006,
                z: (Math.random() - 0.5) * 0.006
            });
        }
        
        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            color: 0xaaffff,
            size: 0.032,
            transparent: true,
            opacity: 0.65,
            blending: THREE.AdditiveBlending
        });
        
        const waterfallParticles = new THREE.Points(particleGeo, particleMaterial);
        scene.add(waterfallParticles);
        
        // Espuma en la base
        const foamCount = 300;
        const foamPositions = new Float32Array(foamCount * 3);
        
        for (let i = 0; i < foamCount; i++) {
            foamPositions[i * 3] = -3.2 + (Math.random() - 0.5) * 1.4;
            foamPositions[i * 3 + 1] = 0.08 + Math.random() * 0.25;
            foamPositions[i * 3 + 2] = -2.2 + (Math.random() - 0.5) * 1.1;
        }
        
        const foamGeo = new THREE.BufferGeometry();
        foamGeo.setAttribute('position', new THREE.BufferAttribute(foamPositions, 3));
        
        const foamMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.024,
            transparent: true,
            opacity: 0.65,
            blending: THREE.AdditiveBlending
        });
        
        const foam = new THREE.Points(foamGeo, foamMaterial);
        scene.add(foam);
        
        // Rocas alrededor
        const rockPositionsAround = [
            [-2.6, 0.1, -1.8], [-3.8, 0.1, -2.0], [-2.4, 0.1, -2.9], [-4.0, 0.1, -2.5],
            [-2.8, 1.4, -2.1], [-3.6, 1.5, -2.2], [-2.5, 1.9, -2.3], [-3.9, 1.7, -2.4]
        ];
        
        rockPositionsAround.forEach(pos => {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2), rockMaterial);
            rock.position.set(pos[0], pos[1], pos[2]);
            rock.castShadow = true;
            scene.add(rock);
        });
        
        // ============================================================
        // ARENA ZEN
        // ============================================================
        
        const sandCanvas = document.createElement('canvas');
        sandCanvas.width = 1024;
        sandCanvas.height = 1024;
        const sandCtx = sandCanvas.getContext('2d');
        
        function initSandTexture() {
            sandCtx.fillStyle = '#e8ddcc';
            sandCtx.fillRect(0, 0, sandCanvas.width, sandCanvas.height);
            
            for (let i = 0; i < 20000; i++) {
                const x = Math.random() * sandCanvas.width;
                const y = Math.random() * sandCanvas.height;
                sandCtx.fillStyle = `rgba(130, 110, 90, ${Math.random() * 0.1})`;
                sandCtx.fillRect(x, y, 1, 1);
            }
            
            sandCtx.strokeStyle = 'rgba(120, 100, 80, 0.25)';
            sandCtx.lineWidth = 3;
            const cx = sandCanvas.width / 2;
            const cy = sandCanvas.height / 2;
            
            for (let r = 180; r < 850; r += 110) {
                sandCtx.beginPath();
                sandCtx.arc(cx, cy, r, 0, Math.PI * 2);
                sandCtx.stroke();
            }
            
            sandCtx.beginPath();
            sandCtx.ellipse(cx - 70, cy + 50, 200, 100, 0.2, 0, Math.PI * 2);
            sandCtx.strokeStyle = 'rgba(130, 110, 80, 0.3)';
            sandCtx.stroke();
        }
        
        initSandTexture();
        const sandTexture = new THREE.CanvasTexture(sandCanvas);
        
        const groundGeo = new THREE.CircleGeometry(9, 128);
        const groundMat = new THREE.MeshStandardMaterial({ 
            map: sandTexture,
            color: 0xe8ddcc,
            roughness: 0.92,
            metalness: 0
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- RASTRILLO ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let lastPos = { x: 0, y: 0 };
        
        const rakeSizeInput = document.getElementById('rake-size');
        const sizeValueSpan = document.getElementById('size-value');
        const clearButton = document.getElementById('clear-sand');
        const statusIndicator = document.getElementById('rake-status');
        
        let brushSize = 3;
        
        rakeSizeInput.addEventListener('input', (e) => {
            brushSize = parseFloat(e.target.value);
            sizeValueSpan.textContent = brushSize;
        });
        
        clearButton.addEventListener('click', () => {
            initSandTexture();
            sandTexture.needsUpdate = true;
        });
        
        function drawOnSand(x, z) {
            const canvasX = ((x / 9) + 1) * 512;
            const canvasY = ((z / 9) + 1) * 512;
            
            if (canvasX >= 0 && canvasX <= sandCanvas.width && canvasY >= 0 && canvasY <= sandCanvas.height) {
                sandCtx.beginPath();
                sandCtx.arc(canvasX, canvasY, brushSize, 0, Math.PI * 2);
                sandCtx.fillStyle = 'rgba(100, 80, 60, 0.3)';
                sandCtx.fill();
                
                if (lastPos.x !== 0 && lastPos.y !== 0) {
                    sandCtx.beginPath();
                    sandCtx.moveTo(lastPos.x, lastPos.y);
                    sandCtx.lineTo(canvasX, canvasY);
                    sandCtx.strokeStyle = 'rgba(80, 60, 40, 0.4)';
                    sandCtx.lineWidth = brushSize;
                    sandCtx.stroke();
                }
                
                lastPos.x = canvasX;
                lastPos.y = canvasY;
                sandTexture.needsUpdate = true;
            }
        }
        
        // ============================================================
        // ELEMENTOS ZEN
        // ============================================================
        
        // Grava
        const gravelGeo = new THREE.BufferGeometry();
        const gravelPositions = new Float32Array(100 * 3);
        for (let i = 0; i < 100; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 8 + 0.5;
            gravelPositions[i * 3] = Math.cos(angle) * radius;
            gravelPositions[i * 3 + 1] = 0.02;
            gravelPositions[i * 3 + 2] = Math.sin(angle) * radius;
        }
        gravelGeo.setAttribute('position', new THREE.BufferAttribute(gravelPositions, 3));
        scene.add(new THREE.Points(gravelGeo, new THREE.PointsMaterial({ color: 0xb0a090, size: 0.03, transparent: true, opacity: 0.45 })));
        
        // Pasto en bordes
        function createGrassBlade(x, z) {
            const height = 0.08 + Math.random() * 0.12;
            const geometry = new THREE.ConeGeometry(0.015, height, 3);
            const material = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.32, 0.5, 0.18), roughness: 0.9 });
            const blade = new THREE.Mesh(geometry, material);
            blade.position.set(x, height/2, z);
            blade.castShadow = true;
            return blade;
        }
        for (let i = 0; i < 100; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 9.2 + Math.random() * 1;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            scene.add(createGrassBlade(x, z));
        }
        
        // Bambú procedural
        function createBamboo(pos) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x6a7a5a, roughness: 0.8 });
            const geo = new THREE.CylinderGeometry(0.085, 0.1, 1.55, 6);
            const stem = new THREE.Mesh(geo, mat);
            stem.position.y = 0.78;
            stem.castShadow = true;
            group.add(stem);
            group.position.set(pos[0], 0, pos[1]);
            return group;
        }
        [[-6, -5.5], [6.5, -5], [-6, 5.5], [6.5, 5], [-7, -2], [7.2, -1.5]].forEach(pos => scene.add(createBamboo(pos)));
        
        // Linternas
        function createLantern(pos) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.95 });
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.12, 6), mat);
            base.position.y = 0.06;
            base.castShadow = true;
            group.add(base);
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.55, 6), mat);
            pillar.position.y = 0.45;
            pillar.castShadow = true;
            group.add(pillar);
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.3), mat);
            box.position.y = 0.9;
            box.castShadow = true;
            group.add(box);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.14, 4), mat);
            roof.position.y = 1.08;
            roof.rotation.y = Math.PI/4;
            roof.castShadow = true;
            group.add(roof);
            group.position.set(pos[0], 0, pos[1]);
            return group;
        }
        scene.add(createLantern([-3.2, 3]));
        scene.add(createLantern([3.2, -2.8]));
        
        // Montañas
        const mountainMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
        const backMountain = new THREE.Mesh(new THREE.ConeGeometry(2.2, 2.5, 5), mountainMat);
        backMountain.position.set(-7, -1, -12);
        scene.add(backMountain);
        const rightMountain = new THREE.Mesh(new THREE.ConeGeometry(1.9, 2.2, 5), mountainMat);
        rightMountain.position.set(6, -1, -13);
        scene.add(rightMountain);
        
        // Cuerda sagrada
        const ropePoints = [];
        for (let i = 0; i <= 60; i++) {
            const angle = (i / 60) * Math.PI * 2;
            ropePoints.push(new THREE.Vector3(Math.cos(angle) * 8.6, 0.06, Math.sin(angle) * 8.6));
        }
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ropePoints), new THREE.LineBasicMaterial({ color: 0x7a6a5a })));
        
        // ============================================================
        // CARGA DE MODELOS (CON ÁRBOLES DE CEREZO DEL MISMO TAMAÑO QUE LOS NORMALES)
        // ============================================================
        
        let modelosCargados = 0;
        const totalModelos = 24; // 18 anteriores + 6 cerezos
        
        function verificarCargaCompleta() {
            modelosCargados++;
            if (modelosCargados >= totalModelos) {
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-screen').remove(), 1000);
                }, 800);
            }
        }
        
        const loader = new GLTFLoader();
        
        const loadModel = (filename, pos, scale = 1, rot = 0) => {
            loader.load(`model-zen/${filename}`, (gltf) => {
                const model = gltf.scene;
                model.position.set(pos.x, pos.y, pos.z);
                model.scale.set(scale, scale, scale);
                model.rotation.y = rot;
                model.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                scene.add(model);
                verificarCargaCompleta();
            }, undefined, () => verificarCargaCompleta());
        };
        
        // Modelos base
        loadModel('Flower Pot.glb', {x: 0, y: 0, z: 0}, 0.5);
        loadModel('Wood Log.glb', {x: 0, y: 0.2, z: 0}, 0.45);
        
        // Rocas
        const rockPos = [[2.2, 1.2, 0.48], [2.8, 1.8, 0.32], [1.6, 2.0, 0.28], [-2.0, -1.5, 0.52], [-2.7, -2.2, 0.38], [-1.3, -2.3, 0.24], [0.8, -2.5, 0.32], [3.2, -1.0, 0.28], [-2.5, 2.2, 0.24]];
        rockPos.forEach((p, i) => loadModel('Rock.glb', {x: p[0], y: 0, z: p[1]}, p[2], i * 0.5));
        
        // Bambú
        const bambooModels = [[-4.5, -4.0, 0.55], [-4.0, -4.5, 0.65], [-3.5, -4.8, 0.48], [4.5, -4.0, 0.6], [4.0, -4.5, 0.7], [3.5, -4.8, 0.52], [-4.5, 4.0, 0.55], [-4.0, 4.5, 0.65], [4.5, 4.0, 0.6], [4.0, 4.5, 0.7]];
        bambooModels.forEach((p, i) => loadModel('Bamboo.glb', {x: p[0], y: 0, z: p[1]}, p[2], i * 0.3));
        
        // Árboles normales
        loadModel('Tree.glb', {x: -3.2, y: 0, z: 2.8}, 0.32);
        loadModel('Tree.glb', {x: 3.5, y: 0, z: 2.5}, 0.28);
        
        // ÁRBOLES DE CEREZO - MISMA ESCALA QUE LOS ÁRBOLES NORMALES (0.28 - 0.32)
        loadModel('Tree cereza.glb', {x: -5, y: 0, z: -4.5}, 0.30);
        loadModel('Tree cereza.glb', {x: 5.5, y: 0, z: -4}, 0.32);
        loadModel('Tree cereza.glb', {x: -5.2, y: 0, z: 4.2}, 0.28);
        loadModel('Tree cereza.glb', {x: 5, y: 0, z: 4}, 0.30);
        loadModel('Tree cereza.glb', {x: -6, y: 0, z: 0}, 0.28);
        loadModel('Tree cereza.glb', {x: 6.2, y: 0, z: -0.5}, 0.29);
        
        // Arbustos
        const bushPos = [[-2.8, -3.2, 0.24], [3.0, -2.8, 0.28], [-1.5, 3.5, 0.2], [2.0, 3.2, 0.24], [-3.5, 1.2, 0.2], [3.8, -1.5, 0.24]];
        bushPos.forEach(p => loadModel('Bush.glb', {x: p[0], y: 0, z: p[1]}, p[2]));
        
        // ============================================================
        // EVENTOS
        // ============================================================
        
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button !== 2) return;
            e.preventDefault();
            mouse.x = (e.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(e.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(ground);
            if (hits.length > 0) {
                isDragging = true;
                controls.autoRotate = false;
                statusIndicator.style.background = '#ffaa44';
                const p = hits[0].point;
                lastPos = { x: 0, y: 0 };
                drawOnSand(p.x, p.z);
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            mouse.x = (e.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(e.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(ground);
            if (hits.length > 0) drawOnSand(hits[0].point.x, hits[0].point.z);
        });
        
        window.addEventListener('mouseup', (e) => {
            if (e.button !== 2) return;
            if (isDragging) {
                isDragging = false;
                controls.autoRotate = true;
                statusIndicator.style.background = '#4a8f4a';
                lastPos = { x: 0, y: 0 };
            }
        });
        
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Controles
        let waterfallActive = true;
        let specialEffects = true;
        
        document.getElementById('waterfall-control').addEventListener('click', () => {
            waterfallActive = !waterfallActive;
            mainFall.visible = waterfallActive;
            backFall.visible = waterfallActive;
            leftFall.visible = waterfallActive;
            rightFall.visible = waterfallActive;
            upperWater.visible = waterfallActive;
            waterfallParticles.visible = waterfallActive;
            foam.visible = waterfallActive;
            waterfallLight.visible = waterfallActive;
            document.getElementById('waterfall-control').textContent = waterfallActive ? '💧 Cascada Activa' : '💧 Cascada Quieta';
        });
        
        document.getElementById('effects-control').addEventListener('click', () => {
            specialEffects = !specialEffects;
            document.getElementById('effects-control').textContent = specialEffects ? '✨ Efectos Especiales' : '✨ Efectos Apagados';
        });

          // ============================================================
// 🍃 HOJAS CAYENDO DE LOS ÁRBOLES
// ============================================================

const leafCount = 150;
const leafPositions = new Float32Array(leafCount * 3);
const leafVelocities = [];

for (let i = 0; i < leafCount; i++) {

    // posición inicial cerca de los árboles
    leafPositions[i * 3] = (Math.random() - 0.5) * 8;
    leafPositions[i * 3 + 1] = Math.random() * 4 + 3;
    leafPositions[i * 3 + 2] = (Math.random() - 0.5) * 8;

    leafVelocities.push({
        x: (Math.random() - 0.5) * 0.003,
        y: -0.004 - Math.random() * 0.003,
        z: (Math.random() - 0.5) * 0.003
    });
}

const leafGeo = new THREE.BufferGeometry();
leafGeo.setAttribute(
    'position',
    new THREE.BufferAttribute(leafPositions, 3)
);

const leafMat = new THREE.PointsMaterial({
    color: 0xffc0cb, // marrón hoja
    size: 0.08,
    transparent: true,
    opacity: 0.8
});

const leaves = new THREE.Points(leafGeo, leafMat);
scene.add(leaves);

        
        // ============================================================
        // ANIMACIÓN
        // ============================================================
        
        let time = 0;
        
        function animate() {
    requestAnimationFrame(animate);
    time += 0.022;
    
    if (waterfallActive) {
        // 🌊 Partículas
        const positions = waterfallParticles.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            const vel = particleVelocities[i];
            positions[i * 3 + 1] += vel.y;

            if (positions[i * 3 + 1] < 0.08) {
                positions[i * 3] = -3.2 + (Math.random() - 0.5) * 1.2;
                positions[i * 3 + 1] = 1.6 + Math.random() * 0.8;
                positions[i * 3 + 2] = -2.2 + (Math.random() - 0.5) * 0.9;
            }
        }
        waterfallParticles.geometry.attributes.position.needsUpdate = true;

        // 🌊 Espuma
        const foamPos = foam.geometry.attributes.position.array;
        for (let i = 0; i < foamCount; i++) {
            foamPos[i * 3 + 1] += 0.005;

            if (foamPos[i * 3 + 1] > 0.35) {
                foamPos[i * 3] = -3.2 + (Math.random() - 0.5) * 1.3;
                foamPos[i * 3 + 1] = 0.08;
                foamPos[i * 3 + 2] = -2.2 + (Math.random() - 0.5) * 1.0;
            }
        }
        foam.geometry.attributes.position.needsUpdate = true;

        // ✨ Efectos
        if (specialEffects) {
            const intensity = 0.55 + Math.sin(time * 2.2) * 0.2;
            waterfallLight.intensity = intensity;
            particleMaterial.opacity = 0.55 + Math.sin(time * 2.5) * 0.1;
            foamMaterial.opacity = 0.6 + Math.sin(time * 3) * 0.15;
        } else {
            waterfallLight.intensity = 0.45;
            particleMaterial.opacity = 0.5;
            foamMaterial.opacity = 0.5;
        }

        mainFall.position.z = -2.35 + Math.sin(time * 2.5) * 0.002;
        backFall.position.z = -2.55 + Math.sin(time * 2.8) * 0.001;
    }

    // AQUÍ VA LA ANIMACIÓN DE HOJAS
    const leafArray = leaves.geometry.attributes.position.array;

    for (let i = 0; i < leafCount; i++) {
        const vel = leafVelocities[i];

        leafArray[i * 3] += vel.x + Math.sin(time + i) * 0.001;
        leafArray[i * 3 + 1] += vel.y;
        leafArray[i * 3 + 2] += vel.z;

        if (leafArray[i * 3 + 1] < 0) {
            leafArray[i * 3] = (Math.random() - 0.5) * 8;
            leafArray[i * 3 + 1] = Math.random() * 4 + 4;
            leafArray[i * 3 + 2] = (Math.random() - 0.5) * 8;
        }
    }

    leaves.geometry.attributes.position.needsUpdate = true;

    // 🎥 Render
    controls.update();
    renderer.render(scene, camera);
}
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

        });
        


    </script>
</body>
